name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="$GITHUB_REF_NAME"
          else
            version="$INPUT_VERSION"
            tag="v$version"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 64
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Import Developer ID Application certificate
        id: signing
        shell: bash
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          if [[ -z "$DEVELOPER_ID_APPLICATION_P12_BASE64" ]]; then
            echo "Missing required GitHub Secret: DEVELOPER_ID_APPLICATION_P12_BASE64" >&2
            exit 1
          fi
          if [[ -z "$DEVELOPER_ID_APPLICATION_P12_PASSWORD" ]]; then
            echo "Missing required GitHub Secret: DEVELOPER_ID_APPLICATION_P12_PASSWORD" >&2
            exit 1
          fi

          keychain_path="$RUNNER_TEMP/codex-pulse-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_password="$(openssl rand -hex 32)"

          printf '%s' "$DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" |
              awk '/Developer ID Application:/ && !identity { identity = $2 } END { print identity }'
          )"
          if [[ -z "$signing_identity" ]]; then
            echo "The imported PKCS#12 does not contain a usable Developer ID Application identity" >&2
            exit 1
          fi

          rm -f "$certificate_path"
          echo "identity=$signing_identity" >> "$GITHUB_OUTPUT"
          echo "keychain=$keychain_path" >> "$GITHUB_OUTPUT"
      - name: Build and package DMG
        run: |
          ./script/package_release.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ steps.release.outputs.version }}" \
            --output dist \
            --signing-identity "${{ steps.signing.outputs.identity }}" \
            --signing-keychain "${{ steps.signing.outputs.keychain }}"
      - name: Notarize and staple DMG
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          if [[ -z "$APP_STORE_CONNECT_API_KEY_P8_BASE64" ]]; then
            echo "Missing required GitHub Secret: APP_STORE_CONNECT_API_KEY_P8_BASE64" >&2
            exit 1
          fi
          if [[ -z "$APP_STORE_CONNECT_API_KEY_ID" ]]; then
            echo "Missing required GitHub Secret: APP_STORE_CONNECT_API_KEY_ID" >&2
            exit 1
          fi
          if [[ -z "$APP_STORE_CONNECT_API_ISSUER_ID" ]]; then
            echo "Missing required GitHub Secret: APP_STORE_CONNECT_API_ISSUER_ID" >&2
            exit 1
          fi

          api_key_path="$RUNNER_TEMP/app-store-connect-api-key.p8"
          dmg_path="dist/Codex-Pulse-${{ matrix.arch }}.dmg"

          umask 077
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 -D > "$api_key_path"
          chmod 600 "$api_key_path"

          xcrun notarytool submit "$dmg_path" \
            --key "$api_key_path" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
      - uses: actions/upload-artifact@v4
        with:
          name: Codex-Pulse-${{ matrix.arch }}
          path: dist/Codex-Pulse-${{ matrix.arch }}.dmg
          if-no-files-found: error
      - name: Remove release credentials
        if: ${{ always() }}
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/codex-pulse-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer-id-application.p12"
          rm -f "$RUNNER_TEMP/app-store-connect-api-key.p8"

  publish-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="$GITHUB_REF_NAME"
          else
            version="$INPUT_VERSION"
            tag="v$version"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 64
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          pattern: Codex-Pulse-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum Codex-Pulse-*.dmg > SHA256SUMS
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            tagged_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
            if [[ "$tagged_sha" != "$GITHUB_SHA" ]]; then
              echo "Refusing to overwrite $RELEASE_TAG assets from $GITHUB_SHA; the tag points to $tagged_sha" >&2
              exit 1
            fi
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "Codex Pulse $RELEASE_VERSION" \
              --generate-notes
          fi

  publish-npm:
    name: Publish npm package
    needs: publish-release
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Set package version
        run: npm version "${{ needs.publish-release.outputs.version }}" --no-git-tag-version
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ needs.publish-release.outputs.version }}
        run: |
          if npm view "@iwecon/codex-pulse@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "@iwecon/codex-pulse@$RELEASE_VERSION is already published"
          else
            npm publish --access public --provenance
          fi
